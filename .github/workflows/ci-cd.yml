name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ══════════════════════════════════════════════════════
  # JOB 1: Tests del Backend
  # ══════════════════════════════════════════════════════
  backend-tests:
    name: Backend — Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: sponsorship_mvp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: test_password
      DB_NAME: sponsorship_mvp
      DB_PORT: 3306
      JWT_SECRET: test-secret-ci-pipeline
      ENV: development

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements-api.txt

      - name: Preparar base de datos de test
        run: |
          mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp < sql/schema.sql
          mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp < sql/seed_data.sql
          mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp < sql/tabla_sesiones.sql
          mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp < sql/indices_optimizacion.sql

          # Aplicar migraciones (es_prueba, estadios, torneos, secondary colors)
          if [ -d sql/migrations ]; then
            for f in sql/migrations/*.sql; do
              echo "Aplicando $(basename $f)..."
              mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp < "$f" 2>&1 | grep -v "Duplicate" || true
            done
          fi

          # Crear usuario admin de test con hash generado aqui
          HASH=$(python -c "import bcrypt; print(bcrypt.hashpw(b'demo2025', bcrypt.gensalt()).decode())")
          mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp -e "
            INSERT INTO planes (nombre, precio_mensual, precio_anual, max_marcas, max_partidos_mes, incluye_audio, incluye_social, incluye_api, incluye_pdf) VALUES
            ('Starter', 2500, 24000, 1, 2, 0, 0, 0, 1),
            ('Professional', 6500, 62400, 3, 99, 1, 0, 0, 1),
            ('Enterprise', 15000, 144000, 99, 99, 1, 1, 1, 1);

            INSERT INTO usuarios (email, password_hash, nombre, rol, sponsor_id) VALUES
            ('admin@sponsorshipmvp.pe', '$HASH', 'Administrador Liga 1', 'admin', NULL),
            ('cliente@test.pe', '$HASH', 'Cliente Test', 'client', 'apuesta_total');
          "
          echo "BD de test lista con migraciones aplicadas"

      - name: Test 1 — Imports y estructura
        run: |
          python -c "
          from api.main import app
          routes = [r for r in app.routes if hasattr(r, 'methods')]
          print(f'Endpoints cargados: {len(routes)}')
          assert len(routes) >= 50, f'Faltan endpoints: {len(routes)}'

          # Verificar que todos los controllers importan
          from api.controllers import auth_controller
          from api.controllers import dashboard_controller
          from api.controllers import detections_controller
          from api.controllers import matches_controller
          from api.controllers import sponsors_controller
          from api.controllers import settings_controller
          from api.controllers import plans_controller
          from api.controllers import sessions_controller
          from api.controllers import training_controller
          from api.controllers import videos_controller
          from api.controllers import pipeline_controller
          print('OK — Todos los controllers importan')

          # Verificar security
          from api.core.security import create_access_token, get_current_user, require_admin
          print('OK — Security module cargado')

          # Verificar schemas
          from api.schemas import LoginRequest, RegisterRequest, CreateSponsorRequest, PositionType
          print('OK — Schemas cargados')
          "

      - name: Test 2 — Iniciar servidor
        run: |
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          echo "Servidor iniciado"

      - name: Test 3 — Health check + conexion BD
        run: |
          RESPONSE=$(curl -s http://localhost:8000/api/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'ok', 'Health check fallo'
          assert data['database'] == 'connected', f'BD: {data[\"database\"]}'
          print('PASS — Health check OK, BD conectada')
          "

      - name: Test 4 — Endpoints publicos (sin auth)
        run: |
          # Planes (publico)
          PLANS=$(curl -s http://localhost:8000/api/plans/)
          echo "Plans: $PLANS"
          echo "$PLANS" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert isinstance(data, list), 'Plans debe ser lista'
          print(f'PASS — {len(data)} planes disponibles')
          "

          # Endpoints protegidos deben dar 403 sin token
          for endpoint in '/api/dashboard/stats' '/api/sponsors/' '/api/matches/' '/api/settings/entidades'; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000$endpoint)
            if [ "$CODE" != "401" ] && [ "$CODE" != "403" ]; then
              echo "FAIL — $endpoint devolvio $CODE (esperado 401 o 403)"
              exit 1
            fi
            echo "PASS — $endpoint protegido ($CODE sin token)"
          done

      - name: Test 5 — Login y JWT
        run: |
          # Login correcto
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@sponsorshipmvp.pe","password":"demo2025"}')
          echo "$RESPONSE" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'access_token' in data, 'Falta access_token'
          assert data['token_type'] == 'bearer', 'Token type incorrecto'
          assert data['user']['rol'] == 'admin', 'Rol incorrecto'
          assert data['user']['email'] == 'admin@sponsorshipmvp.pe', 'Email incorrecto'
          print(f'PASS — Login exitoso: {data[\"user\"][\"nombre\"]} ({data[\"user\"][\"rol\"]})')
          "

          # Login incorrecto — password malo
          BAD_PASS=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@sponsorshipmvp.pe","password":"wrong"}')
          [ "$BAD_PASS" = "401" ] && echo "PASS — Password incorrecto da 401"

          # Login incorrecto — email no existe
          BAD_EMAIL=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"noexiste@test.com","password":"123456"}')
          [ "$BAD_EMAIL" = "401" ] && echo "PASS — Email inexistente da 401"

      - name: Test 6 — Endpoints autenticados con JWT
        run: |
          # Obtener token
          TOKEN=$(curl -s -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@sponsorshipmvp.pe","password":"demo2025"}' \
            | python -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          AUTH="Authorization: Bearer $TOKEN"

          # Dashboard stats
          curl -s http://localhost:8000/api/dashboard/stats -H "$AUTH" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'partidos' in data, 'Falta partidos'
          assert 'smv_total' in data, 'Falta smv_total'
          print(f'PASS — Dashboard: {data[\"partidos\"]} partidos, {data[\"sponsors\"]} sponsors')
          "

          # Sponsors
          curl -s http://localhost:8000/api/sponsors/ -H "$AUTH" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert isinstance(data, list), 'Sponsors debe ser lista'
          assert len(data) > 0, 'Debe haber sponsors'
          print(f'PASS — {len(data)} sponsors cargados')
          "

          # Matches
          curl -s http://localhost:8000/api/matches/ -H "$AUTH" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert isinstance(data, list), 'Matches debe ser lista'
          print(f'PASS — {len(data)} partidos')
          "

          # Settings
          curl -s http://localhost:8000/api/settings/entidades -H "$AUTH" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert isinstance(data, list), 'Entidades debe ser lista'
          print(f'PASS — {len(data)} entidades')
          "

          # Mi perfil
          curl -s http://localhost:8000/api/auth/me -H "$AUTH" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['email'] == 'admin@sponsorshipmvp.pe', 'Email incorrecto'
          print(f'PASS — Perfil: {data[\"nombre\"]} ({data[\"rol\"]})')
          "

      - name: Test 7 — Sesiones en BD
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@sponsorshipmvp.pe","password":"demo2025"}' \
            | python -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          AUTH="Authorization: Bearer $TOKEN"

          # Ver sesiones activas
          curl -s http://localhost:8000/api/auth/sessions -H "$AUTH" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert isinstance(data, list), 'Sesiones debe ser lista'
          assert len(data) > 0, 'Debe haber al menos 1 sesion'
          s = data[0]
          assert 'ip_address' in s, 'Falta ip_address'
          assert 'user_agent' in s, 'Falta user_agent'
          assert 'created_at' in s, 'Falta created_at'
          assert 'expires_at' in s, 'Falta expires_at'
          print(f'PASS — {len(data)} sesiones activas, IP: {s[\"ip_address\"]}')
          "

          # Logout
          LOGOUT=$(curl -s -X POST http://localhost:8000/api/auth/logout -H "$AUTH")
          echo "Logout: $LOGOUT"
          echo "$LOGOUT" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['message'] == 'Sesion cerrada', 'Logout fallo'
          print('PASS — Logout exitoso')
          "

      - name: Test 8 — Validacion de inputs
        run: |
          # Password muy corto (min 6)
          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"test@test.com","password":"123","nombre":"Test"}')
          [ "$CODE" = "422" ] && echo "PASS — Password corto rechazado (422)"

          # Email vacio
          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"","password":"123456"}')
          [ "$CODE" = "422" ] && echo "PASS — Email vacio rechazado (422)"

      - name: Test 9 — Rate limiting (solo en /auth/login)
        run: |
          # El rate limit solo aplica a /api/auth/login para evitar brute-force
          for i in $(seq 1 65); do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:8000/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"noexiste@test.com","password":"abc123"}')
            if [ "$CODE" = "429" ]; then
              echo "PASS — Rate limit en login activo despues de $i requests (HTTP 429)"
              exit 0
            fi
          done
          echo "WARN — Rate limit no se activo en 65 requests"

      - name: Resumen de tests
        if: always()
        run: |
          echo "========================================"
          echo "  Backend Tests completados"
          echo "  Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "========================================"

  # ══════════════════════════════════════════════════════
  # JOB 2: Build Frontend
  # ══════════════════════════════════════════════════════
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependencias
        working-directory: web
        run: npm ci

      - name: Build de produccion
        working-directory: web
        run: npm run build

  # ══════════════════════════════════════════════════════
  # JOB 3: Build Docker images
  # ══════════════════════════════════════════════════════
  docker-build:
    name: Docker — Build images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t sponsorship-api:${{ github.sha }} .

      - name: Build Web image
        run: docker build -t sponsorship-web:${{ github.sha }} ./web

      - name: Verificar imagenes
        run: |
          docker images | grep sponsorship
          echo "OK — Imagenes construidas"

  # ══════════════════════════════════════════════════════
  # JOB 4: Deploy a VPS (Hostinger u otro)
  # ══════════════════════════════════════════════════════
  #
  # ┌────────────────────────────────────────────────────┐
  # │  COMO CONFIGURAR CUANDO TENGAS EL VPS:            │
  # │                                                    │
  # │  1. En tu VPS, instalar Docker:                    │
  # │     curl -fsSL https://get.docker.com | sh         │
  # │                                                    │
  # │  2. Clonar el repo en el VPS:                      │
  # │     git clone https://github.com/Jesus123J/        │
  # │       sponsorship_mvp.git /app                     │
  # │                                                    │
  # │  3. Crear SSH key para GitHub:                     │
  # │     ssh-keygen -t ed25519 -f deploy_key            │
  # │     # Copiar deploy_key.pub al VPS:                │
  # │     #   ~/.ssh/authorized_keys                     │
  # │     # Copiar deploy_key (privada) a GitHub:        │
  # │     #   Settings → Secrets → DEPLOY_SSH_KEY        │
  # │                                                    │
  # │  4. Agregar estos secrets en GitHub:               │
  # │     Settings → Secrets and variables → Actions     │
  # │                                                    │
  # │     VPS_HOST      = 154.xx.xx.xx (IP del VPS)      │
  # │     VPS_USER      = root                           │
  # │     VPS_SSH_KEY   = (contenido de deploy_key)      │
  # │     VPS_PORT      = 22                             │
  # │     DB_PASSWORD   = tu_password_produccion         │
  # │     JWT_SECRET    = tu_secreto_produccion          │
  # │                                                    │
  # │  5. En el VPS crear .env:                          │
  # │     nano /app/.env                                 │
  # │     DB_HOST=localhost                              │
  # │     DB_PASSWORD=tu_password                        │
  # │     JWT_SECRET=tu_secreto                          │
  # │                                                    │
  # │  6. Descomentar el job deploy abajo                │
  # └────────────────────────────────────────────────────┘

  deploy:
    name: Deploy — VPS Produccion (auto-setup + push)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Verificar configuracion de deploy
        id: check
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS no configurado — saltando deploy. Agrega los secrets en GitHub."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "VPS configurado — procediendo con deploy"
            echo "configured=true" >> $GITHUB_OUTPUT
            # Determina si autenticar con key o password
            if [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
              echo "auth=key" >> $GITHUB_OUTPUT
            else
              echo "auth=password" >> $GITHUB_OUTPUT
            fi
          fi

      # ────────────────────────────────────────────
      # AUTH POR SSH KEY (recomendado, mas seguro)
      # ────────────────────────────────────────────
      - name: Deploy via SSH (key)
        if: steps.check.outputs.configured == 'true' && steps.check.outputs.auth == 'key'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 600s
          command_timeout: 60m
          script: ${{ env.DEPLOY_SCRIPT }}
        env:
          DEPLOY_SCRIPT: |
            set -e
            BRANCH="${{ github.ref_name }}"
            APP_DIR="/opt/sponsorship_mvp"

            echo "================================================"
            echo "  Deploy automatico — $(date)"
            echo "  Branch: $BRANCH"
            echo "================================================"

            # ── 1. Instalar dependencias del sistema si faltan ──
            if ! command -v docker &> /dev/null || ! command -v git &> /dev/null; then
              echo "==> Primera vez — instalando dependencias del sistema..."
              apt-get update -y
              apt-get install -y git curl ufw
              if ! command -v docker &> /dev/null; then
                curl -fsSL https://get.docker.com | sh
                systemctl enable docker
                systemctl start docker
              fi
              apt-get install -y docker-compose-plugin
              ufw allow 22/tcp
              ufw allow 8000/tcp
              ufw allow 3000/tcp
              ufw allow 80/tcp
              ufw allow 443/tcp
              ufw --force enable || true
            fi

            # ── 2. Clonar repo si no existe ──
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "==> Primera vez — clonando repo..."
              git clone -b "$BRANCH" https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # ── 3. Pull ultima version ──
            echo "==> Actualizando codigo..."
            git fetch --all
            git reset --hard "origin/$BRANCH"

            # ── 4. Generar/Actualizar .env ──
            PUBLIC_IP=$(curl -s ifconfig.me || echo "${{ secrets.VPS_HOST }}")
            if [ ! -f .env ]; then
              echo "==> Primera vez — generando .env..."
              cp .env.production.example .env
              DB_PASS=$(openssl rand -hex 16)
              JWT_KEY=$(openssl rand -hex 32)
              sed -i "s|cambiar_este_password_super_seguro|$DB_PASS|g" .env
              sed -i "s|cambiar_este_secreto_de_minimo_64_caracteres_aleatorios|$JWT_KEY|g" .env
              sed -i "s|45.88.191.29|$PUBLIC_IP|g" .env
              echo "==> Credenciales generadas (guardadas en /root/.deploy_credentials.txt)"
              echo "DB_PASSWORD=$DB_PASS" > /root/.deploy_credentials.txt
              echo "JWT_SECRET=$JWT_KEY" >> /root/.deploy_credentials.txt
              chmod 600 /root/.deploy_credentials.txt
            fi

            # ── 4b. Asegurar que CORS_ORIGINS y NEXT_PUBLIC_API_URL apunten a la IP publica ──
            # NEXT_PUBLIC_API_URL DEBE terminar en /api (el codigo hace `${API}/training/...`)
            echo "==> Verificando URLs publicas en .env..."
            grep -q "^CORS_ORIGINS=" .env || echo "CORS_ORIGINS=http://$PUBLIC_IP:3000" >> .env
            grep -q "^NEXT_PUBLIC_API_URL=" .env || echo "NEXT_PUBLIC_API_URL=http://$PUBLIC_IP:8000/api" >> .env
            sed -i "s|^CORS_ORIGINS=.*|CORS_ORIGINS=http://$PUBLIC_IP:3000|" .env
            sed -i "s|^NEXT_PUBLIC_API_URL=.*|NEXT_PUBLIC_API_URL=http://$PUBLIC_IP:8000/api|" .env

            # ── 5. Build + arrancar ──
            echo "==> Build + start contenedores..."
            docker compose -f docker-compose.prod.yml up -d --build

            # ── 6. Migraciones ──
            echo "==> Esperando MySQL..."
            sleep 12
            echo "==> Aplicando migraciones..."
            docker compose -f docker-compose.prod.yml exec -T api python -m scripts.migrate || true

            # ── 7. Estado final ──
            echo ""
            echo "==> Estado de contenedores:"
            docker compose -f docker-compose.prod.yml ps
            echo ""
            echo "================================================"
            echo "  ✅ Deploy completado: $(date)"
            echo "  Frontend: http://${{ secrets.VPS_HOST }}:3000"
            echo "  API:      http://${{ secrets.VPS_HOST }}:8000/api/health"
            echo "================================================"

      # ────────────────────────────────────────────
      # AUTH POR PASSWORD (fallback, menos seguro)
      # ────────────────────────────────────────────
      - name: Deploy via SSH (password)
        if: steps.check.outputs.configured == 'true' && steps.check.outputs.auth == 'password'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 600s
          command_timeout: 60m
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            APP_DIR="/opt/sponsorship_mvp"

            echo "================================================"
            echo "  Deploy automatico — $(date)"
            echo "  Branch: $BRANCH"
            echo "================================================"

            if ! command -v docker &> /dev/null || ! command -v git &> /dev/null; then
              echo "==> Primera vez — instalando dependencias..."
              apt-get update -y
              apt-get install -y git curl ufw
              if ! command -v docker &> /dev/null; then
                curl -fsSL https://get.docker.com | sh
                systemctl enable docker && systemctl start docker
              fi
              apt-get install -y docker-compose-plugin
              ufw allow 22/tcp; ufw allow 8000/tcp; ufw allow 3000/tcp
              ufw allow 80/tcp; ufw allow 443/tcp
              ufw --force enable || true
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone -b "$BRANCH" https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch --all
            git reset --hard "origin/$BRANCH"

            if [ ! -f .env ]; then
              cp .env.production.example .env
              DB_PASS=$(openssl rand -hex 16)
              JWT_KEY=$(openssl rand -hex 32)
              PUBLIC_IP=$(curl -s ifconfig.me || echo "${{ secrets.VPS_HOST }}")
              sed -i "s|cambiar_este_password_super_seguro|$DB_PASS|g" .env
              sed -i "s|cambiar_este_secreto_de_minimo_64_caracteres_aleatorios|$JWT_KEY|g" .env
              sed -i "s|45.88.191.29|$PUBLIC_IP|g" .env
              echo "DB_PASSWORD=$DB_PASS" > /root/.deploy_credentials.txt
              echo "JWT_SECRET=$JWT_KEY" >> /root/.deploy_credentials.txt
              chmod 600 /root/.deploy_credentials.txt
            fi

            docker compose -f docker-compose.prod.yml up -d --build
            sleep 12
            docker compose -f docker-compose.prod.yml exec -T api python -m scripts.migrate || true
            docker compose -f docker-compose.prod.yml ps
            echo "✅ Deploy OK — http://${{ secrets.VPS_HOST }}:3000"

      - name: Resumen
        run: |
          echo "========================================"
          echo "  CI/CD Pipeline — ${{ github.ref_name }}"
          echo "========================================"
          echo "  Commit:    ${{ github.sha }}"
          echo "  Actor:     ${{ github.actor }}"
          echo "  Tests:     OK"
          echo "  Build:     OK"
          if [ "${{ steps.check.outputs.configured }}" = "true" ]; then
            echo "  Deploy:    OK (auth: ${{ steps.check.outputs.auth }})"
            echo "  URL:       http://${{ secrets.VPS_HOST }}:3000"
            echo "  API:       http://${{ secrets.VPS_HOST }}:8000/api/health"
          else
            echo "  Deploy:    Pendiente"
            echo ""
