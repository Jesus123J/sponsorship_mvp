name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ══════════════════════════════════════
  # JOB 1: Verificar Backend (API)
  # ══════════════════════════════════════
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: sponsorship_mvp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements-api.txt

      - name: Crear tablas en MySQL de test
        run: |
          mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp < sql/schema.sql
          mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp < sql/seed_data.sql
          mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp < sql/seed_usuarios.sql
          mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp < sql/tabla_sesiones.sql
          mysql -h 127.0.0.1 -u root -ptest_password sponsorship_mvp < sql/indices_optimizacion.sql

      - name: Verificar que la API carga correctamente
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: sponsorship_mvp
          DB_PORT: 3306
          JWT_SECRET: test-secret-ci
          ENV: development
        run: |
          python -c "
          from api.main import app
          routes = [r for r in app.routes if hasattr(r, 'methods')]
          print(f'API cargada: {len(routes)} endpoints')
          assert len(routes) >= 50, f'Faltan endpoints: solo {len(routes)}'
          print('OK — Todos los routers y controllers importan correctamente')
          "

      - name: Test health check
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: sponsorship_mvp
          DB_PORT: 3306
          JWT_SECRET: test-secret-ci
          ENV: development
        run: |
          # Iniciar servidor en background
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

          # Health check
          RESPONSE=$(curl -s http://localhost:8000/api/health)
          echo "Health: $RESPONSE"
          echo "$RESPONSE" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'ok', 'Health check fallo'
          assert data['database'] == 'connected', 'BD no conectada'
          print('OK — Health check passed')
          "

      - name: Test login endpoint
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: test_password
          DB_NAME: sponsorship_mvp
          DB_PORT: 3306
          JWT_SECRET: test-secret-ci
          ENV: development
        run: |
          # Login
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@sponsorshipmvp.pe","password":"demo2025"}')
          echo "Login: $RESPONSE"

          # Verificar token
          echo "$RESPONSE" | python -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'access_token' in data, 'No se recibio token'
          assert data['user']['rol'] == 'admin', 'Rol incorrecto'
          print(f'OK — Login exitoso: {data[\"user\"][\"email\"]} ({data[\"user\"][\"rol\"]})')
          "

          # Usar token para acceder a endpoint protegido
          TOKEN=$(echo "$RESPONSE" | python -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          STATS=$(curl -s http://localhost:8000/api/dashboard/stats \
            -H "Authorization: Bearer $TOKEN")
          echo "Dashboard stats: $STATS"

          # Verificar que endpoint sin token da 403
          FORBIDDEN=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/dashboard/stats)
          echo "Sin token: HTTP $FORBIDDEN"
          [ "$FORBIDDEN" = "403" ] && echo "OK — Endpoints protegidos correctamente"

  # ══════════════════════════════════════
  # JOB 2: Verificar Frontend (Web)
  # ══════════════════════════════════════
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependencias
        working-directory: web
        run: npm ci

      - name: Build de produccion
        working-directory: web
        run: npm run build

  # ══════════════════════════════════════
  # JOB 3: Build Docker images
  # ══════════════════════════════════════
  docker:
    name: Docker — Build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t sponsorship-api:${{ github.sha }} .

      - name: Build Web image
        run: docker build -t sponsorship-web:${{ github.sha }} ./web

      - name: Verificar imagenes
        run: |
          docker images | grep sponsorship
          echo "OK — Imagenes Docker construidas"

  # ══════════════════════════════════════
  # JOB 4: Deploy a produccion (Supabase)
  # ══════════════════════════════════════
  deploy:
    name: Deploy — Produccion
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      # ┌─────────────────────────────────────────────────────────┐
      # │  SUPABASE: Configurar cuando tengas las credenciales   │
      # │                                                         │
      # │  Ir a: GitHub repo → Settings → Secrets → Actions      │
      # │  Agregar estos secrets:                                 │
      # │                                                         │
      # │  SUPABASE_URL        = https://xxx.supabase.co          │
      # │  SUPABASE_ANON_KEY   = eyJ...                           │
      # │  SUPABASE_SERVICE_KEY = eyJ... (para migraciones)       │
      # │  SUPABASE_DB_URL     = postgresql://...                 │
      # │  JWT_SECRET           = tu-secreto-produccion           │
      # │  DEPLOY_HOST          = IP del servidor                 │
      # │  DEPLOY_KEY           = SSH key del servidor            │
      # └─────────────────────────────────────────────────────────┘

      - name: Verificar secrets de Supabase
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "⏳ SUPABASE_URL no configurado — deploy pendiente"
            echo "📋 Configura los secrets en GitHub → Settings → Secrets → Actions"
            echo ""
            echo "Secrets necesarios:"
            echo "  SUPABASE_URL"
            echo "  SUPABASE_ANON_KEY"
            echo "  SUPABASE_SERVICE_KEY"
            echo "  SUPABASE_DB_URL"
            echo "  JWT_SECRET"
            exit 0
          fi
          echo "OK — Secrets configurados"

      - name: Migrar esquema a Supabase
        if: ${{ secrets.SUPABASE_DB_URL != '' }}
        run: |
          # Instalar psql
          sudo apt-get install -y postgresql-client

          # Ejecutar migraciones
          psql "${{ secrets.SUPABASE_DB_URL }}" -f sql/schema.sql
          psql "${{ secrets.SUPABASE_DB_URL }}" -f sql/tabla_sesiones.sql
          psql "${{ secrets.SUPABASE_DB_URL }}" -f sql/indices_optimizacion.sql
          echo "OK — Esquema migrado a Supabase"

      - name: Resumen del deploy
        run: |
          echo "════════════════════════════════════════"
          echo "  CI/CD Pipeline completado"
          echo "════════════════════════════════════════"
          echo "  Commit:   ${{ github.sha }}"
          echo "  Branch:   ${{ github.ref_name }}"
          echo "  Actor:    ${{ github.actor }}"
          echo "  Backend:  ✅ Tests passed"
          echo "  Frontend: ✅ Build passed"
          echo "  Docker:   ✅ Images built"
          echo "════════════════════════════════════════"
